# ─────────────────────────────────────────────────
#  Hotel Grande ERP – Application Properties
#  Database: MySQL via XAMPP
# ─────────────────────────────────────────────────

server.port=8080

# ── MySQL via XAMPP ───────────────────────────────
# XAMPP MySQL runs on localhost:3306 by default.
# Username: root | Password: (empty by default in XAMPP)
# If you set a password in phpMyAdmin, replace the empty value below.
spring.datasource.url=jdbc:mysql://localhost:3306/hotelgrande_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────
# 'update' → Hibernate creates tables on first run and preserves data on restart.
# Use 'create-drop' if you want a fresh DB every restart (dev/testing).
# Use 'validate' in production (never let Hibernate modify your prod schema).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── H2 console disabled (not using H2 anymore) ───
spring.h2.console.enabled=false

# ── JWT ───────────────────────────────────────────
# Use a long, random Base64-encoded secret (min 256 bits for HS256).
# IMPORTANT: Replace this with a real secret before going to production!
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 hours
